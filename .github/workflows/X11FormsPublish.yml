name: Build and Pack X11Forms
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  release:
    types: [ created ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: List all .csproj files
        run: |
          find . -name "*.csproj" | sort

      - name: Remove zombie projects (SimpleTest*)
        run: |
          rm -f SimpleTest.csproj SimpleTest.NetCore.csproj
          rm -rf SimpleTest/ SimpleTest.NetCore/
          if find . -name "SimpleTest*.csproj" -print | grep -q .; then
            find . -name "SimpleTest*.csproj" -print
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore

      - name: Build and Pack only required projects
        run: |
          dotnet pack ./System.Windows.Forms/System.Windows.Forms.csproj --configuration Release --include-symbols --output ./nupkg
          dotnet pack ./Mono.WebBrowser/Mono.WebBrowser.csproj --configuration Release --include-symbols --output ./nupkg
          dotnet pack ./System.Drawing.Design/System.Drawing.Design.csproj --configuration Release --include-symbols --output ./nupkg
          dotnet pack ./System.Windows.Forms.DataVisualization/System.Windows.Forms.DataVisualization.csproj --configuration Release --include-symbols --output ./nupkg

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nupkg/*.nupkg

      - name: List generated packages
        run: |
          ls -la nupkg/
