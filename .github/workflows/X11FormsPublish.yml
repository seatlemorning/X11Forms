name: Publish to NuGet
on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Create clean build directory
        run: |
          mkdir -p build_temp
          mkdir -p nupkg

          rm -rf SimpleTest*
          
          cp -r System.Windows.Forms build_temp/
          cp -r Mono.WebBrowser build_temp/
          cp -r System.Drawing.Design build_temp/
          cp -r System.Windows.Forms.DataVisualization build_temp/
          cp *.props build_temp/ 2>/dev/null || true
          cp *.targets build_temp/ 2>/dev/null || true

          echo "📁 Files in build_temp (after cleanup):"
          ls -la build_temp/

      - name: Restore packages
        run: |
          cd build_temp
          dotnet restore System.Windows.Forms/System.Windows.Forms.csproj
          dotnet restore Mono.WebBrowser/Mono.WebBrowser.csproj
          dotnet restore System.Drawing.Design/System.Drawing.Design.csproj
          dotnet restore System.Windows.Forms.DataVisualization/System.Windows.Forms.DataVisualization.csproj

      - name: Build and Pack
        run: |
          cd build_temp
          dotnet pack System.Windows.Forms/System.Windows.Forms.csproj -c Release --output ../nupkg --no-restore
          dotnet pack Mono.WebBrowser/Mono.WebBrowser.csproj -c Release --output ../nupkg --no-restore
          dotnet pack System.Drawing.Design/System.Drawing.Design.csproj -c Release --output ../nupkg --no-restore
          dotnet pack System.Windows.Forms.DataVisualization/System.Windows.Forms.DataVisualization.csproj -c Release --output ../nupkg --no-restore

      - name: List generated packages
        run: |
          echo "📦 Generated packages:"
          ls -la ./nupkg/

      - name: NuGet Login (Trusted Publishing)
        uses: NuGet/login@v1
        with:
          user: seatlemorning

      - name: Push to NuGet
        run: |
          if ls ./nupkg/*.nupkg 1> /dev/null 2>&1; then
            dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json
          else
            echo "No packages found to push!"
            exit 1
          fi
