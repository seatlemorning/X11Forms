name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Remove problematic projects
      run: |
        rm -rf SimpleTest/ SimpleTest.NetCore/ SimpleTest.NetFX/
        # Также удаляем любые другие .csproj файлы в этих папках
        find . -name "*.csproj" -path "*/SimpleTest/*" -delete 2>/dev/null || true
        find . -name "*.csproj" -path "*/SimpleTest.NetCore/*" -delete 2>/dev/null || true
        find . -name "*.csproj" -path "*/SimpleTest.NetFX/*" -delete 2>/dev/null || true
        echo "Remaining .csproj files:"
        find . -name "*.csproj" | grep -v "SimpleTest" || echo "No problematic projects found"

    - name: Build and Pack
      run: |
        dotnet pack System.Windows.Forms/System.Windows.Forms.csproj -c Release --output ./nupkg
        dotnet pack Mono.WebBrowser/Mono.WebBrowser.csproj -c Release --output ./nupkg || true
        dotnet pack System.Drawing.Design/System.Drawing.Design.csproj -c Release --output ./nupkg || true
        dotnet pack System.Windows.Forms.DataVisualization/System.Windows.Forms..DataVisualization.csproj -c Release --output ./nupkg

    - name: NuGet Login (Trusted Publishing)
      uses: NuGet/login@v1
      with:
        user: seatlemorning

    - name: Push to NuGet
      run: |
        if ls ./nupkg/*.nupkg 1> /dev/null 2>&1; then
          dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json
        else
          echo "No packages found to push!"
          exit 1
        fi
