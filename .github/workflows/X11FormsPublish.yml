name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Remove problematic projects
      run: |
        rm -rf SimpleTest SimpleTest.NetCore SimpleTest.NetFX

    - name: Restore packages
      run: |
        dotnet restore System.Windows.Forms/System.Windows.Forms.csproj
        dotnet restore Mono.WebBrowser/Mono.WebBrowser.csproj
        dotnet restore System.Drawing.Design/System.Drawing.Design.csproj

    - name: Build projects
      run: |
        dotnet build System.Windows.Forms/System.Windows.Forms.csproj -c Release --no-restore
        dotnet build Mono.WebBrowser/Mono.WebBrowser.csproj -c Release --no-restore
        dotnet build System.Drawing.Design/System.Drawing.Design.csproj -c Release --no-restore

    - name: Pack projects
      run: |
        dotnet pack System.Windows.Forms/System.Windows.Forms.csproj -c Release --output ./nupkg --no-build
        dotnet pack Mono.WebBrowser/Mono.WebBrowser.csproj -c Release --output ./nupkg --no-build
        dotnet pack System.Drawing.Design/System.Drawing.Design.csproj -c Release --output ./nupkg --no-build

    - name: List generated packages
      run: |
        echo "📦 Generated packages:"
        ls -la ./nupkg/

    - name: NuGet Login (Trusted Publishing)
      uses: NuGet/login@v1
      with:
        user: seatlemorning

    - name: Push to NuGet
      run: |
        if ls ./nupkg/*.nupkg 1> /dev/null 2>&1; then
          dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json
        else
          echo "No packages found to push!"
          exit 1
        fi
