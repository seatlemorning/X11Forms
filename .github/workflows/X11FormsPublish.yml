name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Build and Pack
      run: |
        for project in $(find . -name "*.csproj" | grep -v "SimpleTest" | grep -v "SimpleTest.NetCore" | grep -v "SimpleTest.NetFX"); do
          echo "📦 Packing: $project"
          dotnet pack "$project" -c Release --output ./nupkg --no-restore
        done

    - name: NuGet Login (Trusted Publishing)
      uses: NuGet/login@v1
      with:
        user: seatlemorning

    - name: Push to NuGet
      run: |
        dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json
