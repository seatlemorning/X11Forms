
name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Remove problematic projects
      run: |
        rm -rf SimpleTest SimpleTest.NetCore SimpleTest.NetFX
        echo "✅ Problematic projects removed"
        echo "Remaining projects:"
        find . -name "*.csproj" -type f

    - name: Restore packages for needed projects
      run: |
        dotnet restore System.Windows.Forms/System.Windows.Forms.csproj
        dotnet restore Mono.WebBrowser/Mono.WebBrowser.csproj
        dotnet restore System.Drawing.Design/System.Drawing.Design.csproj
        dotnet restore System.Windows.Forms.DataVisualization/System.Windows.Forms.DataVisualization.csproj

    - name: Build and Pack
      run: |
        dotnet pack System.Windows.Forms/System.Windows.Forms.csproj -c Release --output ./nupkg --no-restore
        dotnet pack Mono.WebBrowser/Mono.WebBrowser.csproj -c Release --output ./nupkg --no-restore
        dotnet pack System.Drawing.Design/System.Drawing.Design.csproj -c Release --output ./nupkg --no-restore
        dotnet restore System.Windows.Forms.DataVisualization/System.Windows.Forms.DataVisualization.csproj -c Release --output ./nupkg --no-restore
    - name: List generated packages
      run: |
        echo "📦 Generated packages:"
        ls -la ./nupkg/

    - name: NuGet Login (Trusted Publishing)
      uses: NuGet/login@v1
      with:
        user: seatlemorning

    - name: Push to NuGet
      run: |
        dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json
