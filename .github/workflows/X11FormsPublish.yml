name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Укажите вашу версию .NET

    - name: Build and Pack
      run: dotnet pack -c Release --output ./nupkg

    - name: NuGet Login (Trusted Publishing)
      uses: NuGet/login@v1
      with:
        # Введите сюда ваше ИМЯ ПОЛЬЗОВАТЕЛЯ на NuGet.org (не email)
        user: seatlemorning 

    - name: Push to NuGet
      run: |
        dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json
